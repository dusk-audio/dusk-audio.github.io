- name: 4K-EQ
  slug: 4k-eq
  tagline: Classic British Console EQ Emulation
  description: Professional 4-band parametric EQ with Brown/Black modes, analog saturation
    modeling, and real-time spectrum analyzer. VST3/AU/LV2/CLAP. The legendary console
    sound, completely free.
  status: released
  featured: true
  version: 1.0.10
- name: Multi-Comp
  slug: multi-comp
  tagline: Multi-mode dynamics compressor
  description: 8 compression modes including Vintage FET, Vintage Opto, a stereo-linked
    SSL-style Bus Compressor, Classic VCA, Studio FET/VCA, Digital, and 4-band Multiband.
    Measured 1176 ratios, T4B opto afterglow, adjustable FET threshold, gain-scaled
    harmonics, transformer emulation, sidechain HP filter, and Off/2x/4x oversampling.
    Professional dynamics control, completely free.
  status: released
  featured: true
  version: 1.3.1
- name: Spectrum Analyzer
  slug: spectrum-analyzer
  tagline: Real-time FFT spectrum visualization
  description: See your sound with crystal clarity. Real-time FFT analysis with LUFS
    metering, true-peak detection, K-System scales, and stereo correlation. Multiple
    display modes, Mid/Side routing, and VST3/AU/LV2/CLAP support.
  status: released
  featured: true
  version: 1.0.1
- name: Chord Analyzer
  slug: chord-analyzer
  tagline: Intelligent chord detection and display
  description: Identify chords in real-time as you play. Perfect for learning, transcription,
    and music theory exploration. Works as a MIDI insert in Cubase, plus instrument
    and FX versions for every major DAW.
  status: released
  featured: true
  version: 1.1.4
- name: TapeMachine
  slug: tapemachine
  tagline: Analog tape saturation with wow/flutter
  description: Professional tape emulation with Swiss800 and Classic102 models, authentic
    saturation, wow/flutter, and premium vintage UI. Completely free.
  status: released
  featured: true
  version: 1.0.9
- name: TapeMachine 2
  slug: tapemachine-2
  tagline: Two-machine analog tape emulation
  description: The next-generation tape engine with two modeled machines, Swiss
    (Studer A800-style) and American (Ampex ATR-102-style), featuring anti-aliased
    tape saturation, per-speed head bump and HF response, four tape speeds, four
    formulations, adjustable head width, wow & flutter, repro
    EQ, and machine-authentic front-panel toggles. 20 factory presets modeled on
    the hardware units' classic settings. Completely free.
  status: released
  featured: true
  version: 1.0.0
- name: Groovemind
  slug: groovemind
  tagline: AI-assisted groove generator
  description: Intelligent rhythm and groove generation powered by machine learning.
  status: in-dev
  featured: false
- name: Multi-Q
  slug: multi-q
  tagline: "Universal EQ: Digital, British Console, and Tube"
  description: Three professional EQs in one plugin. Modern parametric with dynamics,
    classic British console emulation with E-series transformer-core low-end saturation,
    and vintage passive tube EQ. Completely free.
  status: released
  featured: true
  version: 0.10.7
- name: DuskVerb
  slug: duskverb
  tagline: Professional Algorithmic Reverb
  description: Professional algorithmic reverb with 11 distinct DSP engines (plate,
