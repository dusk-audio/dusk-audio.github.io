    macros, early reflections, random-walk modulation, freeze, and 20 hardware-inspired
    factory presets. Completely free.
  status: pre-release
  featured: true
  version: 0.6.0
- name: Convolution Reverb
  slug: convolution-reverb
  tagline: IR-based reverb
  description: Load your own impulse responses for realistic space simulation.
  status: in-dev
  featured: false
- name: Tape Echo
  slug: tape-echo
