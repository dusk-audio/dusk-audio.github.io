<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="keywords" content="audio plugins, VST3, LV2, AU, Linux audio, free plugins, EQ, compressor">
  <meta name="author" content="Dusk Audio">

  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.og_title | default: page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:image" content="{{ page.og_image | default: '/assets/images/dusk-studio-hero.png' | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ page.og_image | default: '/assets/images/dusk-studio-hero.png' | absolute_url }}">

  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Favicon placeholder -->
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
</head>
<body class="{{ page.body_class }}">
  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include email-capture.html %}

  {% include footer.html %}

  <script>
    // Normalize external links sitewide: open in a new tab + rel="noopener noreferrer".
    (function () {
      var links = document.querySelectorAll('a[href^="http://"], a[href^="https://"]');
      for (var i = 0; i < links.length; i++) {
        var a = links[i];
        if (!a.hostname || a.hostname === location.hostname) continue;
        a.setAttribute('target', '_blank');
        var rel = (a.getAttribute('rel') || '').split(/\s+/).filter(Boolean);
        if (rel.indexOf('noopener') < 0) rel.push('noopener');
        if (rel.indexOf('noreferrer') < 0) rel.push('noreferrer');
        a.setAttribute('rel', rel.join(' '));
      }
    })();
  </script>
</body>
</html>
