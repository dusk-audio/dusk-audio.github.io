# Dusk Audio - Jekyll Configuration
title: Dusk Audio
description: Free, high-quality audio plugins for Linux, Windows, and macOS
url: "https://duskaudio.com"
baseurl: ""

# Build settings
markdown: kramdown
permalink: pretty

# Sass/SCSS
sass:
  style: compressed

# Collections
collections:
  plugins:
    output: true
    permalink: /plugins/:name/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "plugins"
    values:
      layout: "plugin"

# Site links
github_repo: https://github.com/dusk-audio/dusk-audio-plugins
releases_url: https://github.com/dusk-audio/dusk-audio-plugins/releases
patreon_url: https://www.patreon.com/cw/DuskAudio
patreon_membership_url: https://www.patreon.com/cw/DuskAudio/membership

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - builds-gate
  - LAUNCH.md
  - dusk-audio        # Orphaned standalone $79/Lemon-Squeezy page, superseded by the Patreon model. Excluded from the GitHub Pages (_site) build and has no separate pipeline (only .github/workflows/pages.yml exists), so it is NOT deployed. Its dusk-audio/CNAME is a stale leftover; the live site is served from the root /CNAME (duskaudio.com). Un-exclude to revive.

